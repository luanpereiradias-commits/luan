<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola Mundo Interactivo</title>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Evita que aparezcan barras de scroll si el texto se mueve mucho */
        }

        h1 {
            font-size: 5rem;
            cursor: pointer;
            transition: all 0.3s ease; /* Hace que el movimiento sea suave y no brusco */
            text-shadow: 2px 2px 20px rgba(0,0,0,0.8);
        }

        /* EFECTO AL PASAR EL MOUSE */
        h1:hover {
            transform: scale(1.1) translateY(-10px) rotate(2deg);
            color: #4db8ff; /* Cambia a un azul neón */
            text-shadow: 0px 0px 30px rgba(77, 184, 255, 0.8);
        }

        p {
            font-size: 1.5rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>¡Hola, mundo!</h1>
    <p>Pasa el mouse sobre el título</p>
</body>
</html>

            cursor: pointer;

            text-shadow: 2px 2px 20px rgba(0,0,0,0.8);

            background: white;
            border-radius: 15px;

            overflow: hidden;
            color: #333;
        }

            background: #4db8ff;
            color: white;
            padding: 15px;
            font-weight: bold;
            text-align: center;
        }

        #chat-messages {
            flex: 1;
            padding: 10px;
            font-size: 0.9rem;
            overflow-y: auto;
        }

        #chat-input {
            border: none;
            border-top: 1px solid #eee;
            padding: 15px;
            outline: none;
        }
    </style>
</head>
<body>

    <h1 onclick="abrirIA()">¡Hola, mundo!</h1>
    <p>Haz clic en el título para preguntar a la IA</p>

        <div id="chat-messages">
            <p><strong>IA:</strong> ¡Hola! Soy tu asistente. ¿En qué puedo ayudarte hoy?</p>
