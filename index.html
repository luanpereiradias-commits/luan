<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar o Espaço - NASA</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.7);
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        h1:hover {
            transform: scale(1.05);
        }

        /* Botão moderno */
        .btn-explorar {
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background: rgba(0, 119, 182, 0.8); /* azul translúcido */
            border: 2px solid #00bcd4;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.5);
            transition: all 0.3s ease;
        }

        .btn-explorar:hover {
            background: #00bcd4;
            color: #000;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 0 40px rgba(0, 188, 212, 0.8);
        }

        /* Pequena instrução */
        p {
            margin-top: 20px;
            font-size: 1.1rem;
            text-shadow: 1px 1px 10px rgba(0,0,0,0.6);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            .btn-explorar {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <h1>Explore o Universo!</h1>
    <button class="btn-explorar" onclick="abrirNASA()">Decolar para a NASA</button>
    <p>Descubra o espaço, planetas e novas fronteiras da ciência.</p>

    <script>
        function abrirNASA() {
            window.open('https://www.nasa.gov', '_blank');
        }
    </script>

</body>
</html>





<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decolar para o Espaço</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        background: radial-gradient(ellipse at bottom, #0b1d2f 0%, #000 100%);
        overflow: hidden;
        text-align: center;
    }

    h1 {
        font-size: 3rem;
        text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.7);
        margin-bottom: 30px;
        transition: transform 0.3s ease;
    }

    h1:hover {
        transform: scale(1.05);
    }

    /* Botão moderno */
    .btn-explorar {
        padding: 18px 50px;
        font-size: 1.3rem;
        font-weight: bold;
        color: white;
        background: rgba(0, 119, 182, 0.8);
        border: 2px solid #00bcd4;
        border-radius: 50px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        box-shadow: 0 0 20px rgba(0, 188, 212, 0.5);
        transition: all 0.3s ease;
        position: relative;
        z-index: 2;
    }

    .btn-explorar:hover {
        background: #00bcd4;
        color: #000;
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 0 40px rgba(0, 188, 212, 0.8);
    }

    /* Foguete */
    .rocket {
        position: absolute;
        bottom: 0;
        width: 60px;
        height: 120px;
        background: linear-gradient(to bottom, #ff4d4d 0%, #ff0000 100%);
        border-radius: 30px 30px 10px 10px;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        opacity: 0;
    }

    .rocket::before {
        content: '';
        position: absolute;
        top: -30px;
        width: 0;
        height: 0;
        border-left: 30px solid transparent;
        border-right: 30px solid transparent;
        border-bottom: 30px solid #ff4d4d;
        border-radius: 50%;
    }

    /* Fogo do foguete */
    .flame {
        width: 20px;
        height: 40px;
        background: orange;
        border-radius: 50%;
        margin-bottom: -20px;
        animation: flameFlicker 0.2s infinite alternate;
    }

    @keyframes flameFlicker {
        0% { transform: scaleY(1); opacity: 1; }
        100% { transform: scaleY(1.5); opacity: 0.6; }
    }

    /* Animação de subida */
    @keyframes launch {
        0% {
            bottom: 0;
            opacity: 1;
        }
        100% {
            bottom: 120%;
            opacity: 0;
        }
    }

</style>
</head>
<body>

<h1>Explore o Universo!</h1>
<button class="btn-explorar" onclick="launchRocket()">Decolar!</button>

<div class="rocket" id="rocket">
    <div class="flame"></div>
</div>

<script>
    function launchRocket() {
        const rocket = document.getElementById('rocket');
        rocket.style.opacity = '1';
        rocket.style.animation = 'launch 3s ease-in forwards';
        
        // Abrir NASA depois do foguete subir
        setTimeout(() => {
            window.open('https://www.nasa.gov', '_blank');
            rocket.style.opacity = '0'; // Resetar foguete
            rocket.style.animation = '';
        }, 3000);
    }
</script>

</body>
</html><!DOCTYPE html>
