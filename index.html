<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Olá Mundo</title>
    <style>
        body {
            background: linear-gradient(135deg, #6b8e23, #32cd32); /* Fundo degradê */
            font-family: 'Arial', sans-serif; /* Fonte limpa e moderna */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Altura completa da tela */
            margin: 0;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            animation: fadeIn 2s ease-in-out; /* Animação de fade-in */
            letter-spacing: 5px; /* Espaçamento entre as letras */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
</body>
</html>
