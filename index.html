

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decolar para o site da NASA</title>
    <style>
        /* Estilo do botão */
        .decolar-btn {
            background-color: #0077b6; /* Cor do fundo */
            color: white;              /* Cor do texto */
            padding: 15px 32px;        /* Espaçamento interno */
            font-size: 16px;           /* Tamanho da fonte */
            border: none;              /* Retirar borda */
            border-radius: 5px;        /* Bordas arredondadas */
            cursor: pointer;          /* Cursor de mãozinha */
            text-align: center;        /* Alinhar o texto */
            text-decoration: none;     /* Remover sublinhado do link */
            box-shadow: 0 0 10px #00bcd4, 0 0 20px #00bcd4; /* Brilho */
            transition: box-shadow 0.3s ease-in-out; /* Efeito suave ao passar o mouse */
        }

        /* Efeito de hover (quando passar o mouse sobre o botão) */
        .decolar-btn:hover {
            background-color: #0096c7;
            box-shadow: 0 0 20px #00bcd4, 0 0 30px #00bcd4, 0 0 40px #00bcd4; /* Brilho mais forte */
        }
    </style>
</head>
<body>
    <a href="https://www.nasa.gov" class="decolar-btn" target="_blank">Decolar</a>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar o Espaço - NASA</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.7);
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        h1:hover {
            transform: scale(1.05);
        }

        /* Botão moderno */
        .btn-explorar {
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background: rgba(0, 119, 182, 0.8); /* azul translúcido */
            border: 2px solid #00bcd4;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.5);
            transition: all 0.3s ease;
        }

        .btn-explorar:hover {
            background: #00bcd4;
            color: #000;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 0 40px rgba(0, 188, 212, 0.8);
        }

        /* Pequena instrução */
        p {
            margin-top: 20px;
            font-size: 1.1rem;
            text-shadow: 1px 1px 10px rgba(0,0,0,0.6);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            .btn-explorar {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <h1>Explore o Universo!</h1>
    <button class="btn-explorar" onclick="abrirNASA()">Decolar para a NASA</button>
    <p>Descubra o espaço, planetas e novas fronteiras da ciência.</p>

    <script>
        function abrirNASA() {
            window.open('https://www.nasa.gov', '_blank');
        }
    </script>

</body>
</html>
