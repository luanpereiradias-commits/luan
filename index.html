<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decolar para o Espaço</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
    text-align: center;
    background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=2070&q=80') no-repeat center center fixed;
    background-size: cover;
}

/* Título */
h1 {
    font-size: 3rem;
    text-shadow: 2px 2px 20px rgba(0,0,0,0.8);
    margin-bottom: 30px;
    position: relative;
    z-index: 2;
}

/* Botão */
.btn-explorar {
    padding: 18px 50px;
    font-size: 1.3rem;
    font-weight: bold;
    color: white;
    background: rgba(0, 119, 182, 0.8);
    border: 2px solid #00bcd4;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 0 20px rgba(0, 188, 212, 0.5);
    transition: all 0.3s ease;
    position: relative;
    z-index: 2;
}

.btn-explorar:hover {
    background: #00bcd4;
    color: #000;
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 0 40px rgba(0, 188, 212, 0.8);
}

/* Foguete */
.rocket {
    position: absolute;
    bottom: 0;
    width: 60px;
    height: 160px;
    opacity: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 2;
}

/* Nariz do foguete */
.rocket-nose {
    width: 0;
    height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 50px solid #d32f2f;
    border-radius: 50% 50% 0 0;
}

/* Corpo com gradiente realista */
.rocket-body {
    width: 40px;
    height: 100px;
    background: linear-gradient(to bottom, #ff6f61, #b71c1c);
    border-radius: 20px;
    position: relative;
}

/* Janela com efeito 3D */
.rocket-window {
    width: 14px;
    height: 14px;
    background: radial-gradient(circle at 30% 30%, #00bcd4, #004d40);
    border-radius: 50%;
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    border: 2px solid #fff;
}

/* Asas */
.rocket-wing-left, .rocket-wing-right {
    width: 12px;
    height: 35px;
    background: #b71c1c;
    position: absolute;
    bottom: 0;
    z-index: -1;
    border-radius: 5px 5px 0 0;
}

.rocket-wing-left {
    left: -12px;
    transform: rotate(-25deg);
}

.rocket-wing-right {
    right: -12px;
    transform: rotate(25deg);
}

/* Chama realista com partículas */
.rocket-flame {
    position: absolute;
    bottom: -20px;
    width: 20px;
    height: 50px;
    background: linear-gradient(to bottom, #ffeb3b, #ff9800, #f44336);
    border-radius: 50%;
    filter: blur(2px);
    animation: flameFlicker 0.2s infinite alternate;
}

@keyframes flameFlicker {
    0% { transform: scaleY(1) scaleX(1); opacity: 1; }
    50% { transform: scaleY(1.6) scaleX(1.2); opacity: 0.7; }
    100% { transform: scaleY(1.2) scaleX(0.9); opacity: 0.5; }
}

/* Animação de subida */
@keyframes launch {
    0% { bottom: 0; opacity: 1; }
    100% { bottom: 120%; opacity: 0; }
}

</style>
</head>
<body>

<h1>Explore o Universo!</h1>
<button class="btn-explorar" onclick="launchRocket()">Decolar!</button>

<div class="rocket" id="rocket">
    <div class="rocket-nose"></div>
    <div class="rocket-body">
        <div class="rocket-window"></div>
        <div class="rocket-wing-left"></div>
        <div class="rocket-wing-right"></div>
    </div>
    <div class="rocket-flame"></div>
</div>

<script>
function launchRocket() {
    const rocket = document.getElementById('rocket');
    rocket.style.opacity = '1';
    rocket.style.animation = 'launch 3s ease-in forwards';
    
    // Abrir NASA após o foguete subir
    setTimeout(() => {
        window.open('https://www.nasa.gov', '_blank');
        rocket.style.opacity = '0';
        rocket.style.animation = '';
    }, 3000);
}
</script>

</body>
</html>
